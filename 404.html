<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="refresh" content="0; url=/">
    <script>
        // Optional JavaScript to handle specific redirects
        var path = window.location.pathname;
        if (path.endsWith(".html")) {
            window.location.href = path.replace(".html", "/");
        }
    </script>
</head>
<body>
    <h1>Page Not Found</h1>
    <p>You will be redirected shortly. If not, click <a href="/">here</a>.</p>
</body>
</html>
